<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spin the Wheel</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    background: #f4f4f8;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }
  h1 {
    margin-bottom: 30px;
  }
  .container {
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .box {
    display: flex;
    flex-direction: column;
  }
  .box label {
    font-weight: bold;
    margin-bottom: 8px;
  }
  textarea {
    width: 250px;
    height: 200px;
    padding: 10px;
    font-size: 14px;
    border: 1px solid #ccc;
    border-radius: 8px;
    resize: vertical;
  }
  #spin-btn {
    font-size: 18px;
    padding: 12px 24px;
    border: none;
    border-radius: 8px;
    background: #4f46e5;
    color: white;
    cursor: pointer;
    transition: background 0.2s, transform 0.2s;
  }
  #spin-btn:hover:not(:disabled) {
    background: #4338ca;
  }
  #spin-btn:disabled {
    background: #ccc;
    cursor: not-allowed;
  }
  #spin-btn.spinning {
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  #results {
    margin-top: 30px;
    max-width: 600px;
    width: 100%;
  }
  #results table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }
  .op-icon {
    width: 28px;
    height: 28px;
    vertical-align: middle;
    margin-right: 8px;
  }
  #results th, #results td {
    padding: 10px 14px;
    text-align: left;
    border-bottom: 1px solid #eee;
  }
  #results th {
    background: #4f46e5;
    color: white;
  }
  body.r6-mode #spin-btn,
  body.r6-mode #r6-btn.active {
    background: #000;
    color: #e30613;
  }
  body.r6-mode #spin-btn:hover:not(:disabled) {
    background: #1a1a1a;
  }
  body.r6-mode #results th {
    background: #000;
    color: #e30613;
  }
  #reset-btn {
    margin-top: 16px;
    padding: 8px 16px;
    border: 1px solid #ccc;
    border-radius: 6px;
    background: white;
    cursor: pointer;
  }
  .error {
    color: #b91c1c;
    margin-top: 12px;
  }
  .top-bar {
    width: 100%;
    max-width: 700px;
    display: flex;
    justify-content: flex-end;
    margin-bottom: -10px;
  }
  #r6-btn {
    padding: 8px 16px;
    border: 1px solid #e30613;
    border-radius: 6px;
    background: #e30613;
    color: #000;
    cursor: pointer;
    font-weight: bold;
  }
  #r6-btn.active {
    background: #000;
    color: #e30613;
    border-color: #e30613;
  }
  #r6-exit-btn {
    padding: 8px 16px;
    border: 1px solid #ccc;
    border-radius: 6px;
    background: white;
    cursor: pointer;
    margin-left: 8px;
  }
  .box-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .toggle-row {
    display: flex;
    gap: 6px;
  }
  .toggle-row .toggle-option {
    font-size: 13px;
    padding: 4px 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    cursor: pointer;
    background: white;
    user-select: none;
  }
  .toggle-row .toggle-option.selected {
    background: #000;
    color: #e30613;
    border-color: #e30613;
  }
</style>
</head>
<body>
<div class="top-bar">
  <button id="r6-btn">R6</button>
  <button id="r6-exit-btn" style="display:none;">Exit R6</button>
</div>
<h1>Spin the Wheel</h1>

<div class="container" id="input-area">
  <div class="box">
    <div class="box-header">
      <label for="small-list" id="small-list-label">Small list</label>
    </div>
    <textarea id="small-list" placeholder="One item per line, e.g.&#10;Alice&#10;Bob&#10;Carol"></textarea>
  </div>

  <button id="spin-btn">Spin!</button>

  <div class="box">
    <div class="box-header">
      <label for="big-list" id="big-list-label">Big list</label>
      <div class="toggle-row" id="r6-toggle" style="display:none;">
        <div class="toggle-option selected" data-side="attackers">Attackers</div>
        <div class="toggle-option" data-side="defenders">Defenders</div>
      </div>
    </div>
    <textarea id="big-list" placeholder="One item per line, e.g.&#10;Goalie&#10;Defender&#10;Set-piece coach&#10;Assistant to the Regional Manager&#10;Etc."></textarea>
  </div>
</div>

<div class="error" id="error-msg"></div>

<div id="results" style="display:none;"></div>

<script>
const smallList = document.getElementById('small-list');
const bigList = document.getElementById('big-list');
const spinBtn = document.getElementById('spin-btn');
const inputArea = document.getElementById('input-area');
const results = document.getElementById('results');
const errorMsg = document.getElementById('error-msg');
const r6Btn = document.getElementById('r6-btn');
const r6ExitBtn = document.getElementById('r6-exit-btn');
const r6Toggle = document.getElementById('r6-toggle');

const R6_TEAM = ["Charlie","James","Jamie","Matt","Rupert"];
const R6_ATTACKERS = ["Sledge","Thatcher","Ash","Thermite","Twitch","Montagne","Glaz","Fuze","Blitz","IQ","Buck","Blackbeard","Capitão","Hibana","Jackal","Ying","Zofia","Dokkaebi","Lion","Finka","Maverick","Nomad","Gridlock","Nøkk","Amaru","Kali","Iana","Ace","Zero","Flores","Osa","Sens","Grim","Brava","Ram","Deimos","Striker","Rauora","Snake"];
const R6_DEFENDERS = ["Snake","Smoke","Mute","Castle","Pulse","Doc","Rook","Kapkan","Tachanka","Jäger","Bandit","Frost","Valkyrie","Caveira","Echo","Mira","Lesion","Ela","Vigil","Maestro","Alibi","Clash","Kaid","Mozzie","Warden","Goyo","Wamai","Oryx","Melusi","Aruni","Thunderbird","Thorn","Azami","Solis","Fenrir","Tubarão","Sentry","Skopós","Denari"];

const R6_ICON_OVERRIDES = {
  "Capitão": "capitao",
  "Nøkk": "nokk",
  "Jäger": "jager",
  "Tubarão": "tubarao",
  "Skopós": "skopos",
};

function operatorIconPath(name) {
  const slug = R6_ICON_OVERRIDES[name] || name.toLowerCase();
  return `assets/r6-operators/${slug}.svg`;
}

let r6Active = false;

function applyR6Side(side) {
  bigList.value = (side === 'attackers' ? R6_ATTACKERS : R6_DEFENDERS).join('\n');
}

function setR6Mode(active) {
  r6Active = active;
  r6Btn.classList.toggle('active', r6Active);
  document.body.classList.toggle('r6-mode', r6Active);
  r6Toggle.style.display = r6Active ? 'flex' : 'none';
  r6ExitBtn.style.display = r6Active ? 'inline-block' : 'none';
  document.getElementById('small-list-label').textContent = r6Active ? 'Players' : 'Small list';
  document.getElementById('big-list-label').textContent = r6Active ? 'Operators' : 'Big list';
  if (r6Active) {
    smallList.value = R6_TEAM.join('\n');
    document.querySelectorAll('.toggle-row .toggle-option').forEach(o => o.classList.remove('selected'));
    document.querySelector('.toggle-row .toggle-option[data-side="attackers"]').classList.add('selected');
    applyR6Side('attackers');
  } else {
    smallList.value = '';
    bigList.value = '';
  }
}

r6Btn.addEventListener('click', () => setR6Mode(!r6Active));
r6ExitBtn.addEventListener('click', () => setR6Mode(false));

document.querySelectorAll('.toggle-row .toggle-option').forEach(opt => {
  opt.addEventListener('click', () => {
    document.querySelectorAll('.toggle-row .toggle-option').forEach(o => o.classList.remove('selected'));
    opt.classList.add('selected');
    applyR6Side(opt.dataset.side);
  });
});

function parseLines(text) {
  return text.split('\n').map(s => s.trim()).filter(s => s.length > 0);
}

function shuffle(array) {
  const arr = array.slice();
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

spinBtn.addEventListener('click', () => {
  const small = parseLines(smallList.value);
  const big = parseLines(bigList.value);

  errorMsg.textContent = '';

  if (small.length === 0 || big.length === 0) {
    errorMsg.textContent = 'Please fill in both lists.';
    return;
  }
  if (big.length < small.length) {
    errorMsg.textContent = 'The list on the right must have at least as many items as the list on the left.';
    return;
  }

  spinBtn.disabled = true;
  spinBtn.classList.add('spinning');

  setTimeout(() => {
    const shuffledBig = shuffle(big);
    const pairs = small.map((item, i) => [item, shuffledBig[i]]);

    inputArea.style.display = 'none';
    errorMsg.textContent = '';

    const smallTitle = r6Active ? 'Players' : 'Small list';
    const bigTitle = r6Active ? 'Operators' : 'Big list';
    let html = `<table><tr><th>${smallTitle}</th><th>${bigTitle}</th></tr>`;
    for (const [a, b] of pairs) {
      const bCell = r6Active
        ? `<img class="op-icon" src="${operatorIconPath(b)}" alt="${escapeHtml(b)}" onerror="this.style.display='none'">${escapeHtml(b)}`
        : escapeHtml(b);
      html += `<tr><td>${escapeHtml(a)}</td><td>${bCell}</td></tr>`;
    }
    html += '</table>';
    html += '<button id="reset-btn">Start over</button>';

    results.innerHTML = html;
    results.style.display = 'block';

    document.getElementById('reset-btn').addEventListener('click', () => {
      results.style.display = 'none';
      inputArea.style.display = 'flex';
      spinBtn.disabled = false;
      spinBtn.classList.remove('spinning');
    });
  }, 800);
});

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
</body>
</html>
